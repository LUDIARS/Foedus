# Foedus 自身の CI
#
# push / pull_request (main) で typecheck → build → test を回す。
# Foedus は本番依存を持たない (esbuild は devDependency 兼 runtime) ため
# npm audit --omit=dev は対象が無く、ここでは実施しない。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  harness:
    name: AIFormat Harness
    permissions:
      contents: read
    # AIFormat harness-checks at the reviewed immutable commit.
    uses: LUDIARS/AIFormat/.github/workflows/harness-checks.yml@b67d1063dbc857ab619b01ba35f7b979b07691ba

  ci-check:
    name: CI Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.14.1"
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build CLI bundle
        run: npm run build

      - name: Run tests
        run: npm test
