# Foedus 横断契約レビュー (定期 + 手動)
#
# LUDIARS の各サービスを sibling 配置で checkout し、Foedus の contract-check を
# `--root <scan-root>` 配下に向けて実行する。critical/high 違反でジョブを fail させる
# 連結契約のゲート。
#
# トリガ:
#   - schedule: 毎週月曜 08:00 JST (= 日曜 23:00 UTC)。GitHub Actions の cron は UTC。
#   - workflow_dispatch: 手動実行。
#
# スキャン対象リポ (LUDIARS org):
#   - Cernere     (public) … registry / OIDC / 個人データ境界の権威
#   - Corpus      (public) … Hub 連結設定
#   - VantanHub   (private) … Hub 連結設定。下記 PAT が無いと checkout 不可
#   - Aedilis     (public) … server/corpus.ts 保有サービス (provider)
#   - Bibliotheca (public) … server/corpus.ts 保有サービス (provider)
#
# private リポ (VantanHub) の扱い:
#   public リポは既定の GITHUB_TOKEN / 匿名 clone で取得できるが、private の
#   VantanHub は read 権限を持つ PAT が必要。Secrets に `LUDIARS_REPO_TOKEN`
#   (org repo:read 相当の Fine-grained PAT) を設定すると VantanHub も対象に含める。
#   未設定の場合は **無言で落とさず** ::warning:: を出して VantanHub をスキップし、
#   残りの public リポのみで契約チェックを実行する (RULE_CODE §7.1: 無言フォールバック禁止)。
#
# ── 既知のギャップ: 外部管理スキーマ (Cernere schema-export) のライブ取得 ──────────
#   2026-07 の変更で、Foedus は外部管理プロジェクトスキーマ (旧 schemas/*.json、例:
#   vantan_user) を自リポに恒久コミットしなくなった。代わりに contract-check 実行の
#   たびに Cernere の `GET /api/admin/projects/schema-export` へライブ HTTP 接続する
#   (CERNERE_BASE_URL + FOEDUS_CERNERE_EXPORT_TOKEN が必須。 src/extract/cernere-schema-client.ts)。
#
#   このワークフローは Cernere を **ソースとして checkout するだけ** で、実行中の
#   Cernere サーバーには到達できない (reachable staging/dev Cernere の仕組みは
#   このリポ/org にまだ無い)。そのため secrets.FOEDUS_CERNERE_EXPORT_TOKEN /
#   vars.CERNERE_BASE_URL が未設定の間は、下記ステップが自動的に
#   `--skip-external-schema` を付与し **C-DATA-08 (外部管理スキーマの個人データ棚卸し)
#   を省略した degraded 実行** になる (VantanHub skip と同じ「無言にしない」パターン:
#   ::warning:: で明示)。
#
#   TODO (人間の判断が必要): 到達可能な staging Cernere を用意するか、CI 専用の
#   Cernere export token を発行し、Secrets に `FOEDUS_CERNERE_EXPORT_TOKEN` を、
#   repository/organization variables に `CERNERE_BASE_URL` を設定すること。
#   設定されれば下記ステップは自動的にライブ取得へ切り替わる (ワークフロー側の
#   追加変更は不要)。

name: Scheduled Contract Review

on:
  schedule:
    # 毎週月曜 08:00 JST = 日曜 23:00 UTC
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-review:
    name: Cross-repo Contract Check
    runs-on: ubuntu-latest
    steps:
      # ── Foedus (検査器) を foedus/ に checkout して build ────────────────────
      - name: Checkout Foedus
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          path: foedus
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.14.1"
          cache: npm
          cache-dependency-path: foedus/package-lock.json

      - name: Build Foedus
        working-directory: foedus
        run: |
          npm ci
          npm run build

      # ── スキャン対象リポを scan-root/<Repo> に sibling 配置 ─────────────────
      # public リポは LUDIARS_REPO_TOKEN があればそれを、無ければ既定トークンを使う。
      - name: Checkout Cernere
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: LUDIARS/Cernere
          path: scan-root/Cernere
          token: ${{ secrets.LUDIARS_REPO_TOKEN || github.token }}
          persist-credentials: false

      - name: Checkout Corpus
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: LUDIARS/Corpus
          path: scan-root/Corpus
          token: ${{ secrets.LUDIARS_REPO_TOKEN || github.token }}
          persist-credentials: false

      - name: Checkout Aedilis
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: LUDIARS/Aedilis
          path: scan-root/Aedilis
          token: ${{ secrets.LUDIARS_REPO_TOKEN || github.token }}
          persist-credentials: false

      - name: Checkout Bibliotheca
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: LUDIARS/Bibliotheca
          path: scan-root/Bibliotheca
          token: ${{ secrets.LUDIARS_REPO_TOKEN || github.token }}
          persist-credentials: false

      # ── private: VantanHub。PAT がある時のみ checkout ──────────────────────
      - name: Checkout VantanHub (private)
        if: ${{ secrets.LUDIARS_REPO_TOKEN != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: LUDIARS/VantanHub
          path: scan-root/VantanHub
          token: ${{ secrets.LUDIARS_REPO_TOKEN }}
          persist-credentials: false

      - name: Note VantanHub skipped (no PAT)
        if: ${{ secrets.LUDIARS_REPO_TOKEN == '' }}
        run: |
          echo "::warning title=VantanHub skipped::LUDIARS_REPO_TOKEN secret 未設定のため private リポ VantanHub を契約チェック対象から除外しました。Hub 連結 (Corpus 側) のみ検査されます。VantanHub も対象に含めるには repo:read 権限の Fine-grained PAT を LUDIARS_REPO_TOKEN として設定してください。"

      # ── 外部管理スキーマ (Cernere schema-export) のライブ取得可否を明示する ────
      # secrets.FOEDUS_CERNERE_EXPORT_TOKEN が無ければ Cernere へ到達できないので
      # --skip-external-schema を明示付与する (無言で失敗/無言で空にしない)。
      - name: Note external-schema skipped (no Cernere export token)
        if: ${{ secrets.FOEDUS_CERNERE_EXPORT_TOKEN == '' }}
        run: |
          echo "::warning title=External schema skipped::FOEDUS_CERNERE_EXPORT_TOKEN secret 未設定 (または到達可能な staging Cernere 未整備) のため、外部管理スキーマ (Cernere schema-export) のライブ取得を --skip-external-schema でスキップします。C-DATA-08 (外部管理スキーマの個人データ棚卸し) はこの実行では 0 件になります。CERNERE_BASE_URL (repository/organization variable) と FOEDUS_CERNERE_EXPORT_TOKEN (secret) を設定すると自動的にライブ取得に切り替わります。"

      # ── 横断契約チェック ────────────────────────────────────────────────────
      # --ci: critical/high 違反があれば exit 1 (= ジョブ fail = ゲート)。
      # 出力 (violations.json / CONTRACT.md) は always() で artifact 保存する。
      - name: Run contract-check
        id: check
        env:
          CERNERE_BASE_URL: ${{ vars.CERNERE_BASE_URL }}
          FOEDUS_CERNERE_EXPORT_TOKEN: ${{ secrets.FOEDUS_CERNERE_EXPORT_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [ -z "$FOEDUS_CERNERE_EXPORT_TOKEN" ]; then
            EXTRA_ARGS="--skip-external-schema"
          fi
          node foedus/dist/cli.js contract-check \
            --root scan-root \
            --json --md --ci \
            --out artifacts \
            $EXTRA_ARGS

      # Keep the precise revisions alongside the report, including when the check fails.
      - name: Record scanned input revisions
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          {
            printf '{\n  "schemaVersion": 1,\n  "repositories": [\n'
            first=true
            for repo in Cernere Corpus Aedilis Bibliotheca VantanHub; do
              repo_path="scan-root/$repo"
              if [ ! -d "$repo_path/.git" ]; then
                continue
              fi
              if [ "$first" = false ]; then
                printf ',\n'
              fi
              printf '    {"repository":"LUDIARS/%s","sha":"%s"}' "$repo" "$(git -C "$repo_path" rev-parse HEAD)"
              first=false
            done
            printf '\n  ]\n}\n'
          } > artifacts/scan-inputs.json

      - name: Upload contract report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: foedus-contract-report
          path: artifacts/
          if-no-files-found: warn

      # 将来 Discord 通知を足す場合はここに step を追加する:
      #   - high 検出時 (steps.check.outcome == 'failure') に
      #     artifacts/CONTRACT.md を要約して Discord webhook へ POST する。
      #   secrets.DISCORD_WEBHOOK_URL を使い、UnityFoundation の
      #   script/discord-notify.js のような送信ヘルパを Foedus 側に置く想定。
